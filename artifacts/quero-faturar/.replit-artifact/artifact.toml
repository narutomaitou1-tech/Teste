kind = "web"
previewPath = "/"
title = "Quero Faturar - Lívia"
version = "1.0.0"
id = "artifacts/quero-faturar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24018

[services.development]
run = "pnpm --filter @workspace/quero-faturar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quero-faturar", "run", "build" ]
publicDir = "artifacts/quero-faturar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24018"
BASE_PATH = "/"
